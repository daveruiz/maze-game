<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&display=swap" rel="stylesheet">
  <title>Dad's Nightmare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: "Barriecito", system-ui;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container > canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    canvas { display: block; }

    /* ── Full-screen elements (outside scaled root, always cover the viewport) ── */
    #blackout {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 8;
    }
    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #e8c56d;
      font-size: 3rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 9;
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* ── Scaled UI root — 1920×1080 design space, positioned by JS ── */
    #ui-root {
      position: absolute;
      top: 0; left: 0;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      pointer-events: none;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: #fff;
    }
    #crosshair-area {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }
    #crosshair {
      position: relative;
      width: 20px; height: 20px;
      flex-shrink: 0;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%; height: 2px;
      top: 50%; transform: translateY(-50%);
    }
    #info-panel {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 24px;
      line-height: 1.6;
      text-align: center;
      white-space: nowrap;
    }
    #message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px currentColor;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #minimap {
      position: absolute;
      bottom: 32px; right: 58px;
      width: 180px;
      height: 180px;
      opacity: 0.7;
      border-radius: 2px;
    }
    #items-hud {
      position: absolute;
      bottom: 220px; right: 58px;
      display: flex;
      gap: 8px;
      padding: 4px 8px;
    }
    .item-slot {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.25;
      transition: opacity 0.4s;
    }
    .item-slot.collected { opacity: 1.0; }
    .item-slot img {
      width: 28px; height: 28px;
      image-rendering: pixelated;
    }
    #key-needed {
      position: absolute;
      bottom: 50%; left: 50%;
      transform: translateX(-50%);
      font-size: 2.2rem;
      color: #fc4;
      text-shadow: 0 0 10px #fc4;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      letter-spacing: 2px;
    }

    /* ── Debug menu ── */
    #debug-menu {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.92);
      border: 1px solid rgba(255,200,60,0.5);
      border-radius: 6px;
      padding: 18px 24px;
      pointer-events: all;
      z-index: 20;
      display: none;
      min-width: 240px;
      color: #ccc;
      font-size: 13px;
    }
    #debug-menu h2 {
      margin: 0 0 14px;
      font-size: 14px;
      color: #e8c56d;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 8px;
    }
    #debug-menu .section-label {
      font-size: 10px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 12px 0 6px;
    }
    #debug-menu .section-label:first-of-type { margin-top: 0; }
    #debug-menu .floor-btns { display: flex; gap: 6px; }
    #debug-menu .floor-btns button {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      padding: 6px 0;
      font-family: "Barriecito", system-ui;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s;
    }
    #debug-menu .floor-btns button:hover {
      background: rgba(232,197,109,0.3);
      color: #fff;
    }
    #debug-menu .floor-btns button.active {
      background: rgba(232,197,109,0.5);
      color: #fff;
      border-color: #e8c56d;
    }
    #debug-menu label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    #debug-menu label:hover { color: #fff; }
    #debug-menu input[type="checkbox"] {
      accent-color: #e8c56d;
      width: 14px; height: 14px;
    }
    #debug-menu .hint {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 8px;
    }

    /* ── Shared HUD bar (battery + suspicion rows) ── */
    .hud-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 8px 16px;
    }
    .hud-bar-icon {
      font-size: 36px;
      line-height: 1;
      width: 1.6em;
      flex-shrink: 0;
      text-align: center;
    }
    .hud-bar-track {
      width: 140px;
      height: 13px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .hud-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.2s, background 0.2s;
    }

    /* ── Suspicion debug panel ── */
    #suspicion-debug {
      display: none;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    /* ── Overlay (title / game over) ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Canvas handles the visual background; solid fallback for no-WebGL */
      background: #050408;
      box-shadow: 0 0 0 9999px #050408;
      pointer-events: all;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #overlay.ready { opacity: 1; }
    #claw-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #overlay h1, #overlay p, #overlay .controls-list, #overlay #start-btn {
      position: relative;
      z-index: 1;
    }
    #overlay h1 {
      font-size: 7rem;
      letter-spacing: 8px;
      margin-bottom: 8px;
      text-transform: uppercase;
      color: #e8c56d;
    }
    #overlay p {
      color: #aaa;
      margin-bottom: 4px;
      font-size: 1.8rem;
    }
    #overlay .controls-list {
      color: #888;
      font-size: 1.6rem;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.8;
    }
    #start-btn {
      background: #e8c56d;
      color: #000;
      border: none;
      padding: 12px 36px;
      font-size: 2rem;
      font-family: "Barriecito", system-ui;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    #start-btn:hover { background: #f0d080; }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="blackout"></div>
    <div id="loading-screen">Loading...</div>

    <!-- Scaled 1920×1080 UI root. All game UI lives here.
         JS centers and scales it to fit any screen size/aspect ratio. -->
    <div id="ui-root">

      <div id="hud" style="display:none;">
        <div id="crosshair-area">
          <span id="ci-visibility" style="font-size:22px;opacity:0.1;transition:opacity 0.15s;line-height:1;filter:saturate(0)">👁</span>
          <div id="crosshair"></div>
          <span id="ci-noise" style="font-size:22px;opacity:0.1;transition:opacity 0.15s;line-height:1;filter:saturate(0)">🔊</span>
        </div>
        <div id="info-panel">
          <div id="floor-text">FLOOR 1 / 3</div>
        </div>
        <div id="stamina-hud" style="position:absolute;top:54%;left:50%;transform:translateX(-50%);display:none;pointer-events:none;">
          <div style="width:80px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
            <div id="stamina-fill" style="height:100%;width:100%;background:#4f8;transition:width 0.2s,background 0.2s;border-radius:2px;"></div>
          </div>
        </div>
        <div id="battery-low" style="position:absolute;bottom:40%;left:50%;transform:translateX(-50%);font-size:1.7rem;color:#f44;letter-spacing:2px;font-weight:bold;text-shadow:0 0 10px #f44;opacity:0;transition:opacity 0.3s;pointer-events:none;">🔋 LOW BATTERY</div>
        <!-- Left HUD stack: items listed bottom-first (column-reverse anchors at bottom) -->
        <div id="left-hud" style="position:absolute;bottom:32px;left:58px;display:flex;flex-direction:column-reverse;gap:6px;align-items:flex-start;">
          <div id="battery-hud" class="hud-bar">
            <span id="battery-icon" class="hud-bar-icon">🔦</span>
            <div class="hud-bar-track">
              <div id="battery-fill" class="hud-bar-fill" style="width:100%;background:#4af;"></div>
            </div>
          </div>
          <div id="visibility-hud" class="hud-bar" style="display:none">
            <span id="visibility-icon" class="hud-bar-icon" style="opacity:0.1;transition:opacity 0.15s">👁</span>
            <div class="hud-bar-track">
              <div id="visibility-fill" class="hud-bar-fill" style="width:0%;background:#446;"></div>
            </div>
          </div>
          <div id="noise-hud" class="hud-bar" style="display:none">
            <span id="noise-icon" class="hud-bar-icon" style="opacity:0.1;transition:opacity 0.15s">🔊</span>
            <div class="hud-bar-track">
              <div id="noise-fill" class="hud-bar-fill" style="width:0%;background:#484;"></div>
            </div>
          </div>
          <div id="suspicion-debug" style="pointer-events:none;"></div>
        </div>
        <div id="items-hud">
          <div class="item-slot" id="item-key"><img src="item-key.png" alt="key"></div>
          <div class="item-slot" id="item-map"><img src="item-map.png" alt="map"></div>
          <div class="item-slot" id="item-compass"><img src="item-compass.png" alt="compass"></div>
        </div>
        <canvas id="minimap" width="120" height="120"></canvas>
        <div id="key-needed"></div>
        <div id="message"></div>
        <div id="debug-menu">
          <h2>DEBUG</h2>
          <div class="section-label">Jump to floor</div>
          <div class="floor-btns">
            <button data-floor="0">1 — Basement</button>
            <button data-floor="1">2 — House</button>
            <button data-floor="2">3 — Village</button>
          </div>
          <div class="section-label">Options</div>
          <label><input type="checkbox" id="dbg-fullbright"> Full brightness</label>
          <label><input type="checkbox" id="dbg-revealmap"> Reveal map + enemies</label>
          <label><input type="checkbox" id="dbg-fastforward"> Fast forward (3×)</label>
          <label><input type="checkbox" id="dbg-soundfield"> Sound field heatmap</label>
          <div class="section-label">Resolution</div>
          <div class="floor-btns">
            <button data-pixelscale="1">1×</button>
            <button data-pixelscale="2">2×</button>
            <button data-pixelscale="4" class="active">4×</button>
            <button data-pixelscale="8">8×</button>
          </div>
          <div class="hint">Press ` to close</div>
        </div>
      </div>

      <div id="overlay">
        <canvas id="claw-canvas"></canvas>
        <h1>DAD'S NIGHTMARE</h1>
        <div class="controls-list">
          WASD — Move &nbsp;|&nbsp; SHIFT — Run &nbsp;|&nbsp; C/CTRL — Crouch &nbsp;|&nbsp; SPACE — Jump &nbsp;|&nbsp; F — Flashlight
        </div>
        <button id="start-btn">ENTER</button>
      </div>

    </div><!-- /ui-root -->
  </div>
  <script>
    // Scale the UI root to fill the viewport.
    // The design space fits the tighter dimension (Math.min), then the root expands
    // to cover the full screen on the unconstrained axis — no bars, no cropping.
    // High-DPR devices with a small CSS viewport (phones/small tablets) get a
    // 1280×720 base design space instead of 1920×1080, so UI elements appear 1.5× larger.
    (function () {
      const root = document.getElementById('ui-root');
      function scaleUI() {
        const dpr = window.devicePixelRatio || 1;
        const smallScreen = dpr >= 2 && Math.min(window.innerWidth, window.innerHeight) < 600;
        const UI_W = smallScreen ? 1280 : 1920;
        const UI_H = smallScreen ? 720  : 1080;
        const scale = Math.min(window.innerWidth / UI_W, window.innerHeight / UI_H);
        // Expand to fill the unconstrained axis so the root covers the entire screen.
        const actualW = window.innerWidth  / scale;
        const actualH = window.innerHeight / scale;
        root.style.width  = actualW + 'px';
        root.style.height = actualH + 'px';
        root.style.transform = `scale(${scale})`;
      }
      scaleUI();
      window.addEventListener('resize', scaleUI);
    })();

    document.fonts.ready.then(function () {
      document.getElementById('overlay').classList.add('ready');
    });
  </script>

  <!-- Claw-through-cloth background animation for the title screen -->
  <script>
  (function () {
    'use strict';
    var canvas  = document.getElementById('claw-canvas');
    var overlay = document.getElementById('overlay');
    var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) return;

    /* ── Shaders ─────────────────────────────────────────────────────── */
    var VERT = [
      'attribute vec2 a_pos;',
      'void main(){ gl_Position=vec4(a_pos,0.0,1.0); }'
    ].join('\n');

    // Light from upper-left: normalize(-0.6,-0.7,0.9) ≈ (-0.466,-0.544,0.699)
    // UV space: x=right, y=down (after flip), z=toward viewer
    var FRAG = [
      'precision highp float;',
      'uniform vec2  u_res;',
      'uniform vec2  u_tip0,u_tip1,u_tip2,u_tip3,u_tip4;',
      'uniform vec2  u_fwd,u_right;',
      'uniform float u_fade;',

      'const vec3  BASE = vec3(0.026,0.022,0.031);',
      'const vec3  LDIR = vec3(-0.466,-0.544,0.699);',
      'const float HS   = 5.0;',

      // Trail bump: narrow cross-section (nail), exponential decay behind the tip.
      // along<0 = behind tip (fabric returning) → main trail
      // along>0 = ahead of tip (not yet reached) → tiny pre-tension
      'float fH(vec2 uv,vec2 tip,float ar,float w,float tl){',
      '  vec2 d=vec2((uv.x-tip.x)*ar,uv.y-tip.y);',
      '  vec2 fwd=normalize(vec2(u_fwd.x*ar,u_fwd.y));',
      '  vec2 rgt=normalize(vec2(u_right.x*ar,u_right.y));',
      '  float p=dot(d,rgt);',
      '  float a=dot(d,fwd);',
      '  float cx=exp(-p*p/(w*w));',
      '  float tr;',
      '  if(a<=0.0){ float t=-a/tl;  tr=exp(-t*4.0); }',
      '  else      { float t= a/0.010; tr=exp(-t*4.0); }',
      '  return cx*tr;',
      '}',

      'float bumpH(vec2 uv){',
      '  float ar=u_res.x/u_res.y;',
      '  float h=0.0;',
      '  h+=fH(uv,u_tip0,ar,0.011,0.16);',
      '  h+=fH(uv,u_tip1,ar,0.014,0.20);',
      '  h+=fH(uv,u_tip2,ar,0.016,0.24);',
      '  h+=fH(uv,u_tip3,ar,0.014,0.20);',
      '  h+=fH(uv,u_tip4,ar,0.011,0.16);',
      '  return h;',
      '}',

      'float weaveH(vec2 uv){',
      '  float ar=u_res.x/u_res.y;',
      '  float wx=sin(uv.x*140.0)*sin(uv.y*2.5/ar);',
      '  float wy=sin(uv.y*140.0/ar)*sin(uv.x*2.5);',
      '  return wx*wy*0.018;',
      '}',

      'void main(){',
      '  vec2 uv=gl_FragCoord.xy/u_res;',
      '  uv.y=1.0-uv.y;',
      '  float ex=1.6/u_res.x;',
      '  float ey=1.6/u_res.y;',
      '  float hc =weaveH(uv);',
      '  float hcx=weaveH(uv+vec2(ex,0.0));',
      '  float hcy=weaveH(uv+vec2(0.0,ey));',
      '  vec3 Nc=normalize(vec3(-(hcx-hc)*HS,-(hcy-hc)*HS,1.0));',
      '  float diffc=max(0.0,dot(Nc,LDIR));',
      '  vec3 colc=BASE*0.07+BASE*diffc*3.4;',
      '  float hb =bumpH(uv);',
      '  float h  =hc+hb;',
      '  float hx =hcx+bumpH(uv+vec2(ex,0.0));',
      '  float hy =hcy+bumpH(uv+vec2(0.0,ey));',
      '  vec3 N=normalize(vec3(-(hx-h)*HS,-(hy-h)*HS,1.0));',
      '  float diff=max(0.0,dot(N,LDIR));',
      '  vec3  H=normalize(LDIR+vec3(0.0,0.0,1.0));',
      '  float spec=pow(max(0.0,dot(N,H)),28.0);',
      '  vec3 colb=BASE*0.07+BASE*diff*3.4+vec3(0.5,0.44,0.65)*spec*0.9;',
      '  gl_FragColor=vec4(mix(colc,colb,u_fade),1.0);',
      '}'
    ].join('\n');

    function mkShader(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        console.error('ClawShader:', gl.getShaderInfoLog(s));
      return s;
    }
    var prog = gl.createProgram();
    gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VERT));
    gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
    var aPos = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    var U = {};
    ['u_res','u_tip0','u_tip1','u_tip2','u_tip3','u_tip4','u_fwd','u_right','u_fade']
      .forEach(function(n){ U[n] = gl.getUniformLocation(prog, n); });

    /* ── Hand anatomy ───────────────────────────────────────────────── */
    // Finger tip positions in local [right, fwd] units.
    // Origin = palm centre; fwd = direction from palm toward fingertips.
    // Based on real proportions: middle longest, ring slightly shorter,
    // index shorter still, pinky and thumb noticeably shorter.
    // right axis: negative = toward thumb side, positive = toward pinky side.
    var FINGERS = [
      [-1.12,  0.48],   // thumb  – short, far to the side
      [-0.52,  0.91],   // index
      [  0.0,  1.00],   // middle – reference (longest)
      [ 0.50,  0.94],   // ring
      [ 1.04,  0.66],   // pinky  – short
    ];
    var HAND_SIZE = 0.115;   // UV units per anatomy unit

    /* ── Animation state machine ─────────────────────────────────────── */
    // Claw drags a short distance across a random area, fading in at the
    // start and out at the end (sine envelope — no hard cut).
    var DRAG_DUR = 7.0;   // s — total duration of one drag pass
    var IDLE_DUR = 5.0;   // s — pause between drags

    var rafId = null, t0 = null;
    var phase = 'idle', phaseStart = -999;
    var startX = 0.4, startY = 0.3;
    var endX   = 0.6, endY   = 0.6;
    var handAngle = 0;
    var lastW = 0, lastH = 0;

    function newDrag() {
      handAngle = (Math.random() - 0.5) * Math.PI * (160/180);  // ±80° from straight down
      var fdx = Math.sin(handAngle);
      var fdy = Math.cos(handAngle);
      var dist = 0.18 + Math.random() * 0.14;
      startX = 0.15 + Math.random() * 0.70;
      startY = 0.05 + Math.random() * 0.55;   // bias toward top for downward motion
      endX = startX + fdx * dist;
      endY = startY + fdy * dist;
    }

    function render(now) {
      if (!rafId) return;
      if (t0 === null) t0 = now;
      var T  = (now - t0) * 0.001;
      var dt = T - phaseStart;

      // Advance phase
      if      (phase === 'idle'     && dt >= IDLE_DUR)  { newDrag(); phase = 'dragging'; phaseStart = T; dt = 0; }
      else if (phase === 'dragging' && dt >= DRAG_DUR)  { phase = 'idle';     phaseStart = T; dt = 0; }

      var fade = 0, dragT = 0;
      if (phase === 'dragging') {
        dragT = Math.min(1, dt / DRAG_DUR);
        // Sine envelope: 0 at start, peaks at middle, 0 at end
        fade = Math.pow(Math.sin(dragT * Math.PI), 0.55);
      }

      // Resize canvas to actual pixel dimensions (inside a CSS-transformed parent)
      var rect = canvas.getBoundingClientRect();
      var dpr  = Math.min(window.devicePixelRatio||1, 2);
      var pw   = Math.round(rect.width  * dpr);
      var ph   = Math.round(rect.height * dpr);
      if (pw !== lastW || ph !== lastH) {
        canvas.width=pw; canvas.height=ph;
        gl.viewport(0,0,pw,ph);
        lastW=pw; lastH=ph;
      }

      // Current hand centre along the drag path
      var mx = startX + (endX - startX) * dragT;
      var my = startY + (endY - startY) * dragT;

      // Hand orientation vectors
      var fdx = Math.sin(handAngle);
      var fdy = Math.cos(handAngle);
      var rx  =  fdy;   // right = fwd rotated 90° CW
      var ry  = -fdx;

      // Compute 5 finger tip positions from anatomy + current hand pose
      var tips = [];
      for (var i = 0; i < 5; i++) {
        var pr = FINGERS[i][0];
        var pf = FINGERS[i][1];
        tips.push([
          mx + rx * pr * HAND_SIZE - fdx * pf * HAND_SIZE,
          my + ry * pr * HAND_SIZE - fdy * pf * HAND_SIZE,
        ]);
      }

      gl.uniform2f(U.u_res,   pw, ph);
      for (var j=0; j<5; j++) gl.uniform2f(U['u_tip'+j], tips[j][0], tips[j][1]);
      gl.uniform2f(U.u_fwd,   fdx, fdy);
      gl.uniform2f(U.u_right, rx,  ry);
      gl.uniform1f(U.u_fade,  fade);

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      rafId = requestAnimationFrame(render);
    }

    function start() {
      if (rafId) return;
      t0 = null; phaseStart = -999; phase = 'idle';
      rafId = requestAnimationFrame(render);
    }
    function stop() {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }

    // Start/stop when overlay show/hides
    var obs = new MutationObserver(function(){
      if (overlay.style.display === 'none') stop();
      else if (!rafId) start();
    });
    obs.observe(overlay, { attributes:true, attributeFilter:['style'] });

    document.fonts.ready.then(function(){ start(); });
  })();
  </script>

  <script type="module" src="/src/main.ts"></script>
</body>
