<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Maze Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container > canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      color: #fff;
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%; height: 2px;
      top: 50%; transform: translateY(-50%);
    }
    #info-panel {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
      white-space: nowrap;
    }
    #enemy-status {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 13px;
      text-align: right;
    }
    #enemy-indicator {
      font-weight: bold;
      letter-spacing: 1px;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      pointer-events: all;
      z-index: 10;
    }
    #overlay h1 {
      font-size: 3rem;
      letter-spacing: 6px;
      margin-bottom: 8px;
      text-transform: uppercase;
      color: #e8c56d;
    }
    #overlay p {
      color: #aaa;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }
    #overlay .controls-list {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.8;
    }
    #start-btn {
      background: #e8c56d;
      color: #000;
      border: none;
      padding: 12px 36px;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    #start-btn:hover { background: #f0d080; }
    #message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px currentColor;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #minimap {
      position: absolute;
      bottom: 16px; right: 16px;
      opacity: 0.7;
      border-radius: 2px;
    }
    #floor-indicator {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 2px;
    }
    #items-hud {
      position: absolute;
      bottom: 142px; right: 16px;
      display: flex;
      gap: 8px;
      background: transparent;
      padding: 4px 8px;
    }
    .item-slot {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.25;
      transition: opacity 0.4s;
    }
    .item-slot.collected {
      opacity: 1.0;
    }
    .item-slot img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }
    #key-needed {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      color: #fc4;
      text-shadow: 0 0 10px #fc4;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      letter-spacing: 2px;
    }
    /* ── Debug menu ───────────────────────────── */
    #debug-menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.92);
      border: 1px solid rgba(255, 200, 60, 0.5);
      border-radius: 6px;
      padding: 18px 24px;
      pointer-events: all;
      z-index: 20;
      display: none;
      min-width: 240px;
      color: #ccc;
      font-size: 13px;
    }
    #debug-menu h2 {
      margin: 0 0 14px;
      font-size: 14px;
      color: #e8c56d;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 8px;
    }
    #debug-menu .section-label {
      font-size: 10px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 12px 0 6px;
    }
    #debug-menu .section-label:first-of-type { margin-top: 0; }
    #debug-menu .floor-btns {
      display: flex;
      gap: 6px;
    }
    #debug-menu .floor-btns button {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      padding: 6px 0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s;
    }
    #debug-menu .floor-btns button:hover {
      background: rgba(232, 197, 109, 0.3);
      color: #fff;
    }
    #debug-menu .floor-btns button.active {
      background: rgba(232, 197, 109, 0.5);
      color: #fff;
      border-color: #e8c56d;
    }
    #debug-menu label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    #debug-menu label:hover { color: #fff; }
    #debug-menu input[type="checkbox"] {
      accent-color: #e8c56d;
      width: 14px;
      height: 14px;
    }
    #debug-menu .hint {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="hud" style="display:none;">
      <div id="crosshair"></div>
      <div id="info-panel">
        <div id="floor-text">PLANTA 1 / 3</div>
        <div id="floor-indicator" id="objective-text">🚪 Encuentra la salida</div>
      </div>
      <div id="stamina-hud" style="position:absolute;top:54%;left:50%;transform:translateX(-50%);display:none;pointer-events:none;">
        <div style="width:80px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
          <div id="stamina-fill" style="height:100%;width:100%;background:#4f8;transition:width 0.2s,background 0.2s;border-radius:2px;"></div>
        </div>
      </div>
      <div id="battery-low" style="position:absolute;bottom:40%;left:50%;transform:translateX(-50%);font-size:0.85rem;color:#f44;letter-spacing:2px;font-weight:bold;text-shadow:0 0 10px #f44;opacity:0;transition:opacity 0.3s;pointer-events:none;">🔋 BATERÍA BAJA</div>
      <div id="battery-hud" style="position:absolute;bottom:20px;left:16px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.5);border-radius:4px;padding:6px 12px;">
        <span id="battery-icon" style="font-size:18px;">🔦</span>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <span id="flashlight-status" style="font-size:11px;color:#888;letter-spacing:1px;font-weight:bold;">OFF</span>
          <div style="width:100px;height:10px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;">
            <div id="battery-fill" style="height:100%;width:100%;background:#4af;transition:width 0.3s,background 0.3s;border-radius:4px;"></div>
          </div>
        </div>
        <span id="battery-pct" style="font-size:11px;color:#aaa;min-width:30px;">100%</span>
      </div>
      <div id="items-hud">
        <div class="item-slot" id="item-key"><img src="item-key.png" alt="key"></div>
        <div class="item-slot" id="item-map"><img src="item-map.png" alt="map"></div>
        <div class="item-slot" id="item-compass"><img src="item-compass.png" alt="compass"></div>
      </div>
      <canvas id="minimap" width="120" height="120"></canvas>
      <div id="key-needed"></div>
      <div id="message"></div>
      <div id="debug-menu">
        <h2>DEBUG</h2>
        <div class="section-label">Saltar a planta</div>
        <div class="floor-btns">
          <button data-floor="0">1 — Sótano</button>
          <button data-floor="1">2 — Casa</button>
          <button data-floor="2">3 — Pueblo</button>
        </div>
        <div class="section-label">Opciones</div>
        <label><input type="checkbox" id="dbg-fullbright"> Iluminación completa</label>
        <label><input type="checkbox" id="dbg-revealmap"> Revelar mapa + enemigos</label>
        <label><input type="checkbox" id="dbg-fastforward"> Fast forward (3×)</label>
        <div class="hint">Pulsa ` para cerrar</div>
      </div>
    </div>
    <div id="overlay">
      <h1>MAZE</h1>
      <p style="color:#e8c56d;margin-bottom:20px;letter-spacing:2px;">RUNNER</p>
      <div class="controls-list">
        WASD — Mover &nbsp;|&nbsp; SHIFT — Correr &nbsp;|&nbsp; ESPACIO — Saltar &nbsp;|&nbsp; F — Linterna<br/>
        Escapa de la criatura<br/>
        <span style="color:#f66;">Cuidado con lo que te persigue...</span>
      </div>
      <button id="start-btn">ENTRAR</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
