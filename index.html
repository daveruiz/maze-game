<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&display=swap" rel="stylesheet">
  <title>Dad's Nightmare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: "Barriecito", system-ui;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container > canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      color: #fff;
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%; height: 2px;
      top: 50%; transform: translateY(-50%);
    }
    #info-panel {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 24px;
      line-height: 1.6;
      text-align: center;
      white-space: nowrap;
    }
    #enemy-status {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 26px;
      text-align: right;
    }
    #enemy-indicator {
      font-weight: bold;
      letter-spacing: 1px;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      pointer-events: all;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #overlay.ready {
      opacity: 1;
    }
    #blackout {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 8;
    }
    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #e8c56d;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 6px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 9;
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #overlay h1 {
      font-size: 7rem;
      letter-spacing: 8px;
      margin-bottom: 8px;
      text-transform: uppercase;
      color: #e8c56d;
    }
    #overlay p {
      color: #aaa;
      margin-bottom: 4px;
      font-size: 1.8rem;
    }
    #overlay .controls-list {
      color: #888;
      font-size: 1.6rem;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.8;
    }
    #start-btn {
      background: #e8c56d;
      color: #000;
      border: none;
      padding: 12px 36px;
      font-size: 2rem;
      font-family: "Barriecito", system-ui;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    #start-btn:hover { background: #f0d080; }
    #message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px currentColor;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #minimap {
      position: absolute;
      bottom: 3vh; right: 3vw;
      width: clamp(60px, 12vw, 180px);
      height: clamp(60px, 12vw, 180px);
      opacity: 0.7;
      border-radius: 2px;
    }
    #items-hud {
      position: absolute;
      bottom: calc(3vh + clamp(60px, 12vw, 180px) + 8px); right: 3vw;
      display: flex;
      gap: 8px;
      background: transparent;
      padding: 4px 8px;
    }
    .item-slot {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.25;
      transition: opacity 0.4s;
    }
    .item-slot.collected {
      opacity: 1.0;
    }
    .item-slot img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }
    #key-needed {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.2rem;
      color: #fc4;
      text-shadow: 0 0 10px #fc4;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      letter-spacing: 2px;
    }
    /* ── Debug menu ───────────────────────────── */
    #debug-menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.92);
      border: 1px solid rgba(255, 200, 60, 0.5);
      border-radius: 6px;
      padding: 18px 24px;
      pointer-events: all;
      z-index: 20;
      display: none;
      min-width: 240px;
      color: #ccc;
      font-size: 13px;
    }
    #debug-menu h2 {
      margin: 0 0 14px;
      font-size: 14px;
      color: #e8c56d;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 8px;
    }
    #debug-menu .section-label {
      font-size: 10px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 12px 0 6px;
    }
    #debug-menu .section-label:first-of-type { margin-top: 0; }
    #debug-menu .floor-btns {
      display: flex;
      gap: 6px;
    }
    #debug-menu .floor-btns button {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      padding: 6px 0;
      font-family: "Barriecito", system-ui;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s;
    }
    #debug-menu .floor-btns button:hover {
      background: rgba(232, 197, 109, 0.3);
      color: #fff;
    }
    #debug-menu .floor-btns button.active {
      background: rgba(232, 197, 109, 0.5);
      color: #fff;
      border-color: #e8c56d;
    }
    #debug-menu label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    #debug-menu label:hover { color: #fff; }
    #debug-menu input[type="checkbox"] {
      accent-color: #e8c56d;
      width: 14px;
      height: 14px;
    }
    #debug-menu .hint {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 8px;
    }
    /* ── Shared HUD bar component (battery + suspicion rows) ─────────── */
    .hud-bar {
      display: flex;
      align-items: center;
      gap: 1vw;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 1vh 2vw;
    }
    .hud-bar-icon {
      font-size: clamp(18px, 3vw, 36px);
      line-height: 1;
      min-width: 1.2em;
      text-align: center;
    }
    .hud-bar-track {
      width: clamp(60px, 12vw, 140px);
      height: clamp(6px, 1.2vh, 14px);
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .hud-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.2s, background 0.2s;
    }
    /* ── Suspicion debug panel ────────────────────── */
    #suspicion-debug {
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Mobile responsive overrides ─────────────── */
    @media (max-width: 768px) {
      #overlay {
        justify-content: flex-start;
        padding-top: 15vh;
        padding-bottom: 10vh;
      }
      #overlay h1 {
        font-size: clamp(2.4rem, 10vw, 5rem);
        letter-spacing: 4px;
        margin-bottom: 4px;
      }
      #overlay p {
        font-size: clamp(1rem, 4vw, 1.4rem);
        margin-bottom: 2px;
      }
      #overlay .controls-list {
        font-size: clamp(0.9rem, 3.5vw, 1.2rem);
        margin-bottom: 20px;
        line-height: 1.6;
      }
      #start-btn {
        font-size: clamp(1.2rem, 5vw, 1.6rem);
        padding: 10px 28px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="blackout"></div>
    <div id="loading-screen">Loading...</div>
    <div id="hud" style="display:none;">
      <div id="crosshair"></div>
      <div id="info-panel">
        <div id="floor-text">FLOOR 1 / 3</div>
      </div>
      <div id="stamina-hud" style="position:absolute;top:54%;left:50%;transform:translateX(-50%);display:none;pointer-events:none;">
        <div style="width:80px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
          <div id="stamina-fill" style="height:100%;width:100%;background:#4f8;transition:width 0.2s,background 0.2s;border-radius:2px;"></div>
        </div>
      </div>
      <div id="battery-low" style="position:absolute;bottom:40%;left:50%;transform:translateX(-50%);font-size:1.7rem;color:#f44;letter-spacing:2px;font-weight:bold;text-shadow:0 0 10px #f44;opacity:0;transition:opacity 0.3s;pointer-events:none;">🔋 LOW BATTERY</div>
      <div id="suspicion-debug" style="position:absolute;bottom:calc(3vh + clamp(64px,11vh,100px) + 10px);left:3vw;pointer-events:none;"></div>
      <div id="left-hud" style="position:absolute;bottom:3vh;left:3vw;display:flex;flex-direction:column;gap:6px;">
        <div id="visibility-hud" class="hud-bar">
          <span id="visibility-icon" class="hud-bar-icon">🌑</span>
          <div class="hud-bar-track">
            <div id="visibility-fill" class="hud-bar-fill" style="width:0%;background:#446;"></div>
          </div>
        </div>
        <div id="battery-hud" class="hud-bar">
          <span id="battery-icon" class="hud-bar-icon">🔦</span>
          <div class="hud-bar-track">
            <div id="battery-fill" class="hud-bar-fill" style="width:100%;background:#4af;"></div>
          </div>
        </div>
      </div>
      <div id="items-hud">
        <div class="item-slot" id="item-key"><img src="item-key.png" alt="key"></div>
        <div class="item-slot" id="item-map"><img src="item-map.png" alt="map"></div>
        <div class="item-slot" id="item-compass"><img src="item-compass.png" alt="compass"></div>
      </div>
      <canvas id="minimap" width="120" height="120"></canvas>
      <div id="key-needed"></div>
      <div id="message"></div>
      <div id="debug-menu">
        <h2>DEBUG</h2>
        <div class="section-label">Jump to floor</div>
        <div class="floor-btns">
          <button data-floor="0">1 — Basement</button>
          <button data-floor="1">2 — House</button>
          <button data-floor="2">3 — Village</button>
        </div>
        <div class="section-label">Options</div>
        <label><input type="checkbox" id="dbg-fullbright"> Full brightness</label>
        <label><input type="checkbox" id="dbg-revealmap"> Reveal map + enemies</label>
        <label><input type="checkbox" id="dbg-fastforward"> Fast forward (3×)</label>
        <div class="section-label">Resolution</div>
        <div class="floor-btns">
          <button data-pixelscale="1">1×</button>
          <button data-pixelscale="2">2×</button>
          <button data-pixelscale="4" class="active">4×</button>
          <button data-pixelscale="8">8×</button>
        </div>
        <div class="hint">Press ` to close</div>
      </div>
    </div>
    <div id="overlay">
      <h1>DAD'S NIGHTMARE</h1>
      <div class="controls-list">
        WASD — Move &nbsp;|&nbsp; SHIFT — Run &nbsp;|&nbsp; C/CTRL — Crouch &nbsp;|&nbsp; SPACE — Jump &nbsp;|&nbsp; F — Flashlight<br/>
        Escape the creature
      </div>
      <button id="start-btn">ENTER</button>
    </div>
  </div>
  <script>
    document.fonts.ready.then(() => {
      document.getElementById('overlay').classList.add('ready');
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
